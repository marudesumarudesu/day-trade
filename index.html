<!DOCTYPE html>

  <!-- Babel (ブラウザ上でReactコードを翻訳) -->

    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .group:hover .group-hover\:rotate-y-180 { transform: rotateY(180deg); }

    ::-webkit-scrollbar-track { background: transparent; }

<body>
  <!-- ここにアプリが描画されます -->

    const { useState, useMemo, useEffect, useRef } = React;

    // ==========================================
    // ReactとLucideの干渉によるクラッシュを防ぐ安全なアイコンコンポーネント
    // ==========================================
    function Icon({ name, className }) {
      const ref = useRef(null);
      
      useEffect(() => {
        if (ref.current && window.lucide) {
          // Reactの管理外で安全にアイコンを描画
          ref.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
          window.lucide.createIcons({ root: ref.current });
        }
      }, [name, className]);

      // contentsクラスでspan自身の余白等を消去
      return <span ref={ref} className="contents"></span>;
    }

    // ==========================================

                  <Icon name="trending-up" className="w-6 h-6" />
                </div>

              {navItems.map((item) => (

    // ==========================================

    // ==========================================
    function FlashcardsView() {
      const cards = [
        { front: "取引推奨時間\n(ゴールデンタイム)", back: "9:00〜9:30。ボラティリティが大きく、短期でも利益を出しやすいため、この時間に全集中する。" },

    // ==========================================
    // 4. クイズビュー
    // ==========================================
    function QuizView() {
      const questions = [
        {
          q: "まる流デイトレ術（PC版）で最も推奨されるトレード時間帯は？",
          options: ["9:00 〜 9:30", "10:00 〜 11:00", "12:30 〜 13:00", "14:30 〜 15:00"],
          answer: 0,
          expl: "ボラティリティが大きく、短期でも利益を出しやすい寄り付き直後の30分がゴールデンタイムです。"
        },
        {
          q: "買いエントリーのチャンスとなる見極めサインはどれ？",
          options: ["日経平均が完全に横ばいになった時", "出来高上昇を伴った連続陽線が出現した時", "ボリンジャーバンドが収縮した時", "出来高が極端に減少し始めた時"],
          answer: 1,
          expl: "寄り付きは基本順張りです。板で強さを確認し、出来高上昇を伴った連続陽線で買いに入ります。"
        },
        {
          q: "トレード時の「最重要ルール」として設定されている利確・損切の基本ラインは？",
          options: ["利確10ティック / 損切5ティック", "利確3ティック / 損切3ティック", "利確5ティック / 損切2ティック", "利確2ティック / 損切5ティック"],
          answer: 2,
          expl: "利確5ティック、損切2ティックを機械的に守ることが成功の鍵です（ボラティリティに応じて調整可）。"
        },
        {
          q: "最強の画面構成（コックピット）に含めるべきチャートとして推奨【されていない】ものはどれ？",
          options: ["日経平均チャート（ティック）", "対象銘柄の1分足チャート", "対象銘柄のティックチャート", "対象銘柄の日足チャート"],
          answer: 3,
          expl: "スキャルピングでは極めて短い時間軸を見るため、日足ではなく「1分足」と「ティックチャート」の2つを使用します。"
        }
      ];

      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [score, setScore] = useState(0);

      const handleSelect = (qIdx, optIdx) => {
        if (submitted) return;
        setAnswers({ ...answers, [qIdx]: optIdx });
      };

      const handleSubmit = () => {
        let currentScore = 0;
        questions.forEach((q, idx) => {
          if (answers[idx] === q.answer) currentScore++;
        });
        setScore(currentScore);
        setSubmitted(true);
      };

      const resetQuiz = () => {
        setAnswers({});
        setSubmitted(false);
        setScore(0);
      };

      return (
        <div className="animate-in fade-in slide-in-from-bottom-4 duration-700 max-w-3xl mx-auto">
          <div className="text-center mb-10">
            <h2 className="text-3xl font-bold text-slate-800 mb-2">実戦前・理解度クイズ</h2>
            <p className="text-slate-500">市場という修羅場へ赴く準備が整っているか、最終確認しましょう。</p>
          </div>

          <div className="space-y-8">
            {questions.map((q, qIdx) => (
              <div key={qIdx} className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex gap-3">
                  <span className="text-blue-600">Q{qIdx + 1}.</span> {q.q}
                </h3>
                <div className="space-y-3">
                  {q.options.map((opt, optIdx) => {
                    const isSelected = answers[qIdx] === optIdx;
                    const isCorrect = q.answer === optIdx;
                    
                    let btnClass = "w-full text-left px-5 py-4 rounded-xl border-2 transition-all duration-200 font-medium text-sm md:text-base ";
                    
                    if (!submitted) {
                      btnClass += isSelected 
                        ? "border-blue-500 bg-blue-50 text-blue-800" 
                        : "border-slate-100 bg-slate-50 text-slate-600 hover:border-blue-200 hover:bg-white";
                    } else {
                      if (isCorrect) {
                        btnClass += "border-green-500 bg-green-50 text-green-800";
                      } else if (isSelected && !isCorrect) {
                        btnClass += "border-red-500 bg-red-50 text-red-800";
                      } else {
                        btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";
                      }
                    }

                    return (
                      <button 
                        key={optIdx} 
                        onClick={() => handleSelect(qIdx, optIdx)}
                        disabled={submitted}
                        className={btnClass}
                      >
                        {opt}
                        {submitted && isCorrect && <span className="float-right text-green-600 font-bold">✓ 正解</span>}
                        {submitted && isSelected && !isCorrect && <span className="float-right text-red-600 font-bold">✗ 不正解</span>}
                      </button>
                    );
                  })}
                </div>
                {submitted && (
                  <div className={`mt-4 p-4 rounded-lg text-sm ${answers[qIdx] === q.answer ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`}>
                    <strong>解説: </strong>{q.expl}
                  </div>
                )}
              </div>
            ))}
          </div>

          <div className="mt-10 p-6 bg-slate-100 rounded-2xl text-center">
            {!submitted ? (
              <button 
                onClick={handleSubmit}
                disabled={Object.keys(answers).length < questions.length}
                className={`px-8 py-3 rounded-xl font-bold text-white shadow-md transition-all ${
                  Object.keys(answers).length < questions.length 
                    ? 'bg-slate-400 cursor-not-allowed' 
                    : 'bg-blue-600 hover:bg-blue-500 hover:scale-105 active:scale-95'
                }`}
              >
                回答を採点する
              </button>
            ) : (
              <div className="animate-in zoom-in duration-500">
                <h3 className="text-2xl font-bold mb-2">
                  結果: {score} / {questions.length} 問正解
                </h3>
                {score === questions.length ? (
                  <p className="text-green-600 font-bold mb-6 flex items-center justify-center gap-2 text-lg">
                    🎉 完璧です！修羅場へ赴く準備が整いました。
                  </p>
                ) : (
                  <p className="text-amber-600 font-bold mb-6">
                    もう一度資料やフラッシュカードで復習しましょう。
                  </p>
                )}
                <button 
                  onClick={resetQuiz}
                  className="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-bold transition-colors"
                >
                  もう一度挑戦する
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 5. 期待値シミュレータビュー
    // ==========================================
    function SimulatorView() {
      useIcons();
      const [winRate, setWinRate] = useState(50);
      const [profit, setProfit] = useState(5);
      const [loss, setLoss] = useState(2);
      const [trials, setTrials] = useState(100);

      const expectedValue = (profit * (winRate / 100)) - (loss * (1 - (winRate / 100)));
      const isProfitable = expectedValue > 0;

      const chartData = useMemo(() => {
        let seed = 1;
        const random = () => {
          const x = Math.sin(seed++) * 10000;
          return x - Math.floor(x);
        };

        const numLines = 5;
        const paths = [];
        let minY = 0;
        let maxY = 0;

        for (let l = 0; l < numLines; l++) {
          let current = 0;
          const points = [{ x: 0, y: 0 }];
          for (let i = 1; i <= trials; i++) {
            const isWin = random() < (winRate / 100);
            current += isWin ? Number(profit) : -Number(loss);
            points.push({ x: i, y: current });
            
            if (current < minY) minY = current;
            if (current > maxY) maxY = current;
          }
          paths.push(points);
        }
        
        // グラフ内に余裕を持たせるためのパディング
        const range = Math.max(maxY - minY, 10);
        minY -= range * 0.15;
        maxY += range * 0.15;

        // ゼロが必ず含まれるようにする
        if (minY > 0) minY = -range * 0.1;
        if (maxY < 0) maxY = range * 0.1;

        return { paths, minY, maxY };
      }, [winRate, profit, loss, trials]);

      const { paths, minY, maxY } = chartData;

      // SVGの座標スケール計算
      const svgWidth = 800;
      const svgHeight = 350;
      const padding = { top: 20, right: 20, bottom: 30, left: 60 };
      const innerWidth = svgWidth - padding.left - padding.right;
      const innerHeight = svgHeight - padding.top - padding.bottom;

      // 実際のデータをSVGの座標に変換する関数
      const scaleX = (x) => padding.left + (x / trials) * innerWidth;
      const scaleY = (y) => padding.top + innerHeight - ((y - minY) / (maxY - minY)) * innerHeight;

      const zeroY = scaleY(0);
      
      // Y軸・X軸の目盛りを計算
      const yTicks = [maxY, maxY * 0.5, 0, minY * 0.5, minY].filter((v, i, a) => a.indexOf(v) === i);
      const xTicks = [0, Math.floor(trials / 2), trials];

      return (
        <div className="animate-in fade-in slide-in-from-bottom-4 duration-700 flex flex-col h-full">
          <div className="mb-4">
            <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-1">期待値シミュレータ</h2>
            <p className="text-slate-500 text-sm">「ルールを守れば勝てる」を視覚化します。感情を排除した機械的トレードの強さを確認してください。</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1 min-h-0">
            {/* 設定パネル */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col justify-between">
              <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2 text-sm">
                <Icon name="trending-up" className="text-blue-600 w-5 h-5" /> 設定パネル
              </h3>
              
              <div className="space-y-4 flex-1">
                <div>
                  <div className="flex justify-between mb-1">
                    <label className="text-xs font-bold text-slate-700">勝率 (%)</label>
                    <span className="text-xs font-bold text-blue-600">{winRate}%</span>
                  </div>
                  <input 
                    type="range" min="10" max="90" step="5" value={winRate} 
                    onChange={(e) => setWinRate(e.target.value)}
                    className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                  />
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-bold text-slate-700 block mb-1">利確幅 (ティック)</label>
                    <input 
                      type="number" min="1" value={profit} 
                      onChange={(e) => setProfit(e.target.value)}
                      className="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm"
                    />
                  </div>
                  <div>
                    <label className="text-xs font-bold text-slate-700 block mb-1">損切幅 (ティック)</label>
                    <input 
                      type="number" min="1" value={loss} 
                      onChange={(e) => setLoss(e.target.value)}
                      className="w-full px-2 py-1.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm"
                    />
                  </div>
                </div>

                <div>
                  <div className="flex justify-between mb-1">
                    <label className="text-xs font-bold text-slate-700">試行回数 (回)</label>
                    <span className="text-xs font-bold text-blue-600">{trials}回</span>
                  </div>
                  <input 
                    type="range" min="10" max="500" step="10" value={trials} 
                    onChange={(e) => setTrials(e.target.value)}
                    className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                  />
                </div>
              </div>

              <div className={`mt-4 p-3 rounded-xl border-2 ${isProfitable ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">1回あたりの期待値</p>
                <div className={`text-2xl font-black ${isProfitable ? 'text-green-600' : 'text-red-600'}`}>
                  {expectedValue > 0 ? '+' : ''}{expectedValue.toFixed(2)} <span className="text-sm font-bold">ティック</span>
                </div>
                <p className={`text-xs mt-1 font-medium ${isProfitable ? 'text-green-700' : 'text-red-700'}`}>
                  {isProfitable ? '長期的には資産が増加します。' : 'この設定では長期的には破産します。'}
                </p>
              </div>
            </div>

            {/* グラフ描画エリア */}
            <div className="lg:col-span-2 bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col h-full min-h-[300px]">
              <h3 className="font-bold text-slate-800 mb-2 text-sm">5人のトレーダーの資産推移シミュレーション</h3>
              <div className="flex-1 relative bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-full absolute inset-0 preserve-3d">
                  
                  {/* Y軸のグリッドとラベル */}
                  {yTicks.map((tick, i) => {
                    const y = scaleY(tick);
                    const isZero = Math.abs(tick) < 0.1; // 浮動小数点誤差対策
                    return (
                      <g key={`y-${i}`}>
                        <line 
                          x1={padding.left} y1={y} 
                          x2={svgWidth - padding.right} y2={y} 
                          stroke={isZero ? "#94a3b8" : "#e2e8f0"} 
                          strokeWidth={isZero ? "2" : "1"} 
                          strokeDasharray={isZero ? "" : "4 4"} 
                        />
                        <text x={padding.left - 10} y={y + 4} textAnchor="end" fontSize="12" fill={isZero ? "#475569" : "#64748b"} fontWeight={isZero ? "bold" : "normal"}>
                          {tick > 0 ? '+' : ''}{Math.round(tick)}
                        </text>
                      </g>
                    );
                  })}

                  {/* X軸のラベル */}
                  {xTicks.map((tick, i) => {
                    const x = scaleX(tick);
                    return (
                      <g key={`x-${i}`}>
                        <text x={x} y={svgHeight - 10} textAnchor="middle" fontSize="12" fill="#64748b">
                          {tick}回
                        </text>
                      </g>
                    );
                  })}

                  {/* 折れ線グラフ */}
                  {paths.map((path, idx) => {
                    const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
                    const d = path.map((p, i) => `${i === 0 ? 'M' : 'L'} ${scaleX(p.x)} ${scaleY(p.y)}`).join(' '); 
                    return (
                      <path 
                        key={idx} 
                        d={d} 
                        fill="none" 
                        stroke={colors[idx]} 
                        strokeWidth="2"
                        strokeLinejoin="round"
                        className="opacity-80 transition-all duration-300"
                      />
                    );
                  })}
                </svg>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // Reactのレンダリング
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
